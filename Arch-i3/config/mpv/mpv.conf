# General
profile=fast
vo=gpu
hwdec=auto-safe
gpu-context=x11egl

# Quality - using faster algorithms
scale=bilinear
cscale=bilinear
dscale=bilinear
correct-downscaling=no
linear-downscaling=no
sigmoid-upscaling=no

# Interpolation - DISABLED (major performance hit)
video-sync=audio
interpolation=no

# Deband - DISABLED (causes stuttering)
deband=no

# Anti-aliasing - DISABLED
temporal-dither=no

# Audio
volume=100
volume-max=200
audio-file-auto=fuzzy
audio-pitch-correction=yes

# Subtitles
sub-auto=fuzzy
sub-file-paths=ass:srt:sub:subs:subtitles
slang=eng,en
alang=jpn,ja,eng,en
sub-font='JetBrainsMono Nerd Font'
sub-font-size=45
sub-color='#FFFFFFFF'
sub-border-color='#FF000000'
sub-border-size=3.0
sub-shadow-offset=1
sub-shadow-color='#33000000'
sub-spacing=0.5

# Screenshots
screenshot-format=png
screenshot-png-compression=8
screenshot-template='~/Pictures/Screenshots/%F (%P) %n'
screenshot-directory=~/Pictures/Screenshots

# OSD (on-screen display)
osc=no
osd-font='JetBrainsMono Nerd Font'
osd-font-size=32
osd-color='#CCFFFFFF'
osd-border-color='#CC000000'
osd-bar-align-y=0.95
osd-border-size=2
osd-bar-h=2
osd-bar-w=60

# Cache
cache=yes
demuxer-max-bytes=400M
demuxer-max-back-bytes=150M

# Window
keep-open=yes
force-window=immediate
cursor-autohide=1000
geometry=50%:50%
autofit-larger=90%x90%
autofit-smaller=30%x30%

# Playback
save-position-on-quit=no
watch-later-directory=~/.config/mpv/watch_later

# Performance optimizations
vd-lavc-threads=0
opengl-pbo=yes
