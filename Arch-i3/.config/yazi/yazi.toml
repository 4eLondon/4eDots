[mgr]
# Show hidden files by default
show_hidden = true
# Sorting
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
# Line mode
linemode = "size"
# Show symlink targets
show_symlink = true

[preview]
# Image preview
image_filter = "lanczos3"
image_quality = 90
# Preview size
tab_size = 2
max_width = 900000
max_height = 900000

[opener]
# Text editors
edit = [
    { run = 'nvim "$@"', block = true, desc = "Edit with Neovim" },
]

# Documents
pdf = [
    { run = 'zathura "$@"', orphan = true, desc = "View with Zathura" },
]

epub = [
    { run = 'foliate "$@"', orphan = true, desc = "Read with Foliate" },
]

# Images
#image = [
#    { run = 'imv "$@"', orphan = true, desc = "View with imv" },
#]

# Images
image = [
    { run = '''
        dir=$(dirname "$1")
        imv -n "$1" "$dir"/*.{jpg,jpeg,png,gif,bmp,webp,tiff,svg,JPG,JPEG,PNG,GIF,BMP,WEBP,TIFF,SVG} 2>/dev/null
    ''', orphan = true, desc = "View with imv" },
]

# Video
video = [
    { run = 'mpv "$@"', orphan = true, desc = "Play with MPV" },
]

# Audio - using MOC
audio = [
    { run = 'mocp -l "$@"', block = true, desc = "Play with MOC" },
]

# Archives - extract to folder named after archive
extract = [
    { run = '''
        archive="$1"
        # Get filename without extension
        base=$(basename "$archive")
        dirname="${base%.*}"
        
        # Create directory if it doesn't exist
        mkdir -p "$dirname"
        
        # Extract based on type
        case "$archive" in
            *.tar.gz|*.tgz)
                tar -xzf "$archive" -C "$dirname"
                ;;
            *.tar.bz2|*.tbz2)
                tar -xjf "$archive" -C "$dirname"
                ;;
            *.tar.xz|*.txz)
                tar -xJf "$archive" -C "$dirname"
                ;;
            *.tar)
                tar -xf "$archive" -C "$dirname"
                ;;
            *.zip)
                unzip -q "$archive" -d "$dirname"
                ;;
            *.rar)
                unrar x "$archive" "$dirname/"
                ;;
            *.7z)
                7z x "$archive" -o"$dirname"
                ;;
            *)
                echo "Unsupported format: $archive"
                rmdir "$dirname" 2>/dev/null
                ;;
        esac
        ''', desc = "Extract to folder" },
]

# LibreOffice - for all office documents
office = [
    { run = 'libreoffice "$@"', orphan = true, desc = "Open with LibreOffice" },
]

# Windows executables
exe = [
    { run = 'wine "$1"', orphan = true, desc = "Run with Wine" },
]


[open]
rules = [
    # Text files
    { mime = "text/*", use = "edit" },
    { mime = "application/json", use = "edit" },
    { mime = "application/xml", use = "edit" },
    { mime = "application/x-yaml", use = "edit" },
    { mime = "application/toml", use = "edit" },
    
    # Documents
    { mime = "application/pdf", use = "pdf" },
    { mime = "application/epub+zip", use = "epub" },
    
    # Images
    { mime = "image/*", use = "image" },
    
    # Video
    { mime = "video/*", use = "video" },
    
    # Audio
    { mime = "audio/*", use = "audio" },
    
    # Archives - auto-extract
    { mime = "application/zip", use = "extract" },
    { mime = "application/x-tar", use = "extract" },
    { mime = "application/gzip", use = "extract" },
    { mime = "application/x-bzip2", use = "extract" },
    { mime = "application/x-xz", use = "extract" },
    { mime = "application/x-compressed-tar", use = "extract" },
    { mime = "application/x-7z-compressed", use = "extract" },
    { mime = "application/x-rar", use = "extract" },

    # LibreOffice documents
    { mime = "application/vnd.oasis.opendocument.text", use = "office" },
    { mime = "application/vnd.oasis.opendocument.spreadsheet", use = "office" },
    { mime = "application/vnd.oasis.opendocument.presentation", use = "office" },
    { mime = "application/vnd.oasis.opendocument.graphics", use = "office" },
    { mime = "application/vnd.oasis.opendocument.formula", use = "office" },
    
    # Microsoft Office documents
    { mime = "application/msword", use = "office" },
    { mime = "application/vnd.openxmlformats-officedocument.wordprocessingml.document", use = "office" },
    { name = "*.docx", use = "office" },
    { name = "*.doc", use = "office" },
    { mime = "application/vnd.ms-excel", use = "office" },
    { mime = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet", use = "office" },
    { name = "*.xlsx", use = "office" },
    { name = "*.xls", use = "office" },
    { mime = "application/vnd.ms-powerpoint", use = "office" },
    { mime = "application/vnd.openxmlformats-officedocument.presentationml.presentation", use = "office" },
    { name = "*.pptx", use = "office" },
    { name = "*.ppt", use = "office" },

# Windows executables
    { mime = "application/x-ms-dos-executable", use = "exe" },
        { mime = "application/x-wine-extension-msi", use = "exe" },
]

[tasks]
# Task manager settings
micro_workers = 5
macro_workers = 10
bizarre_retry = 5
